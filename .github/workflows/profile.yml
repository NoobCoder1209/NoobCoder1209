name: profile

# Daily auto-regen of dynamic README assets:
#  - Snake animation eating the contribution grid (light + dark) → output branch
#  - lowlighter/metrics composite SVGs (overall, languages) → assets/ on main
#
# Off-peak cron at 04:37 UTC to avoid round-hour GitHub API rush.
# Manually fireable via the workflow_dispatch tab.

on:
  schedule:
    - cron: "37 4 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/profile.yml

permissions:
  contents: write

jobs:
  snake:
    name: Generate contribution snake
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: NoobCoder1209
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  metrics-overall:
    name: Generate overall metrics SVG
    runs-on: ubuntu-latest
    steps:
      - name: Light theme
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: NoobCoder1209
          filename: assets/metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Sofia
          plugin_lines: yes
          plugin_followup: yes
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12
          committer_branch: main
          committer_message: "chore: refresh metrics.svg"

      - name: Dark theme
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: NoobCoder1209
          filename: assets/metrics-dark.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Sofia
          config_order: base.header, base.activity, base.community, base.repositories
          plugin_lines: yes
          plugin_followup: yes
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12
          committer_branch: main
          committer_message: "chore: refresh metrics-dark.svg"
        env:
          METRICS_DARK: "1"

  metrics-languages:
    name: Generate languages SVG
    runs-on: ubuntu-latest
    steps:
      - name: Light theme
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: NoobCoder1209
          filename: assets/metrics-languages.svg
          template: classic
          base: ""
          config_timezone: Europe/Sofia
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, less
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          committer_branch: main
          committer_message: "chore: refresh metrics-languages.svg"
